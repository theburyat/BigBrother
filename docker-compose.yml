version: "3.9"
services:
  postgres:
    image: postgres:latest
    container_name: postgres
    hostname: host.docker.internal
    environment:
      POSTGRES_DB: "big_brother_eye"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      PG_DATA: "/var/lib/postgresql/bigbrother_data/"
    volumes:
      - ./dev/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  bigbrother:
    image: theburyat/bigbrother
    hostname: host.docker.internal
    container_name: bigbrother
    ports:
      - "7120:80"
    links:
      - "postgres:postgres"